<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Mango Grove</title>

  <link rel="stylesheet" href="style.css"/>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<header>
  <div class="logo">
    <img src="nuzvidagrifarms_logo.png" alt="Nuzvid Agri Farms" class="logo-img"/>
  </div>
</header>

<section class="hero">
  <h1>Fresh Mangoes Delivered</h1>
  <p>Farm fresh mangoes directly to your doorstep.</p>
</section>

<div class="container">

  <div class="mango-grid" id="mangoGrid"></div>

  <div class="form-box">

    <h2>Customer Details</h2>

    <input type="text" id="customerName" placeholder="Your Name"/>

    <input type="tel" id="customerPhone" placeholder="Phone Number"/>

    <textarea id="customerAddress" rows="4" placeholder="Delivery Address"></textarea>

  </div>

</div>

<div class="sticky-cart">

  <div id="cartText">
    0 KG • ₹0
  </div>

  <button onclick="placeOrder()">
    Place Order 🥭
  </button>

</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>

</body>
</html>
